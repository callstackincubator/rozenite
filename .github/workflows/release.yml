name: Release

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Release mode to run
        required: true
        type: choice
        options:
          - stable
          - rc
          - canary

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.event.inputs.mode }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  release:
    name: Run release
    runs-on: ubuntu-latest
    env:
      RELEASE_MODE: ${{ github.event.inputs.mode }}
      RELEASE_REF: ${{ github.ref_name }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GIT_AUTHOR_NAME: actions-bot
      GIT_AUTHOR_EMAIL: actions-bot@users.noreply.github.com
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release
        run: pnpm release:run
